<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for Gradients and Shadows -->
  <defs>
    <!-- Background Gradient (Dark Mode) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>

    <!-- Medical Cross Gradient (Neon Blue/Indigo) -->
    <linearGradient id="cross-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <!-- AI Connectivity Nodes Gradient -->
    <linearGradient id="ai-nodes-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Outer Glow Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="500" height="500" rx="100" fill="url(#bg-grad)" />

  <!-- Outer Glassmorphism Circle Rings -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  <circle cx="250" cy="250" r="150" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6" stroke-dasharray="15 15" />

  <!-- Center Logo Container -->
  <g transform="translate(125, 125)">
    <!-- Shield / Location Icon Base -->
    <path d="M125 15 L215 50 V115 C215 180 155 225 125 235 C95 225 35 180 35 115 V50 Z" 
          fill="rgba(56, 189, 248, 0.15)" stroke="url(#cross-grad)" stroke-width="8" filter="url(#glow)"/>

    <!-- Futuristic Medical Cross (Bed + Care) -->
    <g transform="translate(125, 115)">
      <!-- Vertical Pilar -->
      <rect x="-15" y="-55" width="30" height="110" rx="10" fill="url(#cross-grad)" />
      <!-- Horizontal Pillar -->
      <rect x="-55" y="-15" width="110" height="30" rx="10" fill="url(#cross-grad)" />
    </g>

    <!-- AI Pulsing Nodes (Representing Real-Time Sockets) -->
    <!-- Top Right Node -->
    <circle cx="160" cy="60" r="8" fill="#F472B6" filter="url(#glow)"/>
    <path d="M140 80 L160 60" stroke="#F472B6" stroke-width="4" stroke-linecap="round"/>

    <!-- Bottom Left Node -->
    <circle cx="85" cy="165" r="8" fill="#8B5CF6" filter="url(#glow)"/>
    <path d="M110 140 L85 165" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>

    <!-- Top Left Node -->
    <circle cx="85" cy="65" r="6" fill="#38BDF8" filter="url(#glow)"/>
    <path d="M105 85 L85 65" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
