<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Dedicated App Icon (Favicon) Version -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="500" height="500" rx="100" fill="url(#bg)" />

  <g transform="translate(125, 125)">
    <!-- Base Shield -->
    <path d="M125 15 L215 50 V115 C215 180 155 225 125 235 C95 225 35 180 35 115 V50 Z" 
          fill="rgba(56, 189, 248, 0.15)" stroke="url(#cross)" stroke-width="12"/>

    <!-- Medical Plus Inside Shield -->
    <g transform="translate(125, 115)">
      <rect x="-15" y="-55" width="30" height="110" rx="15" fill="url(#cross)" />
      <rect x="-55" y="-15" width="110" height="30" rx="15" fill="url(#cross)" />
    </g>
  </g>
</svg>
